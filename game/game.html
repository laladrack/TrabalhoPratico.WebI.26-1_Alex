<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TERMO - Jogo</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div class="container">
    <h1 class="title">TERMO</h1>
    <p class="subtitle">Olá, nome!</p>
    <p class="attempts">Tentativa 0/6</p>

    <!-- Grid de tentativas -->
    <div class="grid">
      <!-- 6 linhas, 5 colunas -->
      <!-- Cada linha pode ser preenchida via JS -->
      <div class="row">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <div class="row">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <div class="row">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <div class="row">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <div class="row">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <div class="row">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
    </div>

    <!-- Teclado virtual -->
    <div class="keyboard">
      <div class="keyboard-row">
        <button>A</button><button>B</button><button>C</button><button>D</button><button>E</button><button>F</button><button>G</button><button>H</button><button>I</button>
      </div>
      <div class="keyboard-row">
        <button>J</button><button>K</button><button>L</button><button>M</button><button>N</button><button>O</button><button>P</button><button>Q</button><button>R</button>
      </div>
      <div class="keyboard-row">
        <button>S</button><button>T</button><button>U</button><button>V</button><button>W</button><button>X</button><button>Y</button><button>Z</button>
        <button class="enter">ENTER</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
