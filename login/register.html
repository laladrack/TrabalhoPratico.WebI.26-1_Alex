<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registrar</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
   <div class="back">
    <a href="../index.html">← Voltar</a>
  </div>

  <div class="card">
    <div class="icon">👤</div>
    <h2>Criar Conta</h2>
    <p>Cadastre-se para começar a jogar.</p>

    <form id="registerForm">
      <label for="username">Nome de usuário</label>
      <input type="text" id="username" placeholder="Digite seu nome de usuário" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Digite seu email" required>

      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite sua senha" required>

      <button type="submit">Criar Conta</button>
    </form>

    <p class="link">Já tem uma conta? <a href="login.html">Faça login</a></p>
    <small>Seu progresso será salvo localmente.</small>
  </div>
</body>
</html>
